{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - AuctionPlatform</title>
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e);">
  {% if messages %}
  <div style="position:fixed;top:1rem;right:1rem;z-index:9999;">
    {% for message in messages %}
    <div class="notification error">{{ message }}</div>
    {% endfor %}
  </div>
  {% endif %}
  <div style="background:rgba(255,255,255,0.1);backdrop-filter:blur(20px);border-radius:15px;padding:2.5rem;width:380px;border:1px solid rgba(255,255,255,0.2);box-shadow:0 8px 32px rgba(0,0,0,0.4);">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-size:3rem;">🔐</div>
      <h2 style="color:#fff;margin:0.5rem 0;">Admin Login</h2>
      <p style="color:#ccc;font-size:0.9rem;">AuctionPlatform Administration</p>
    </div>
    <form method="POST" action="{% url 'admin_login' %}">
      {% csrf_token %}
      <div style="margin-bottom:1rem;">
        <input type="email" name="email" placeholder="Admin Email" required style="width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(255,255,255,0.15);color:#fff;font-size:1rem;outline:none;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:1.5rem;">
        <input type="password" name="password" placeholder="Password" required style="width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(255,255,255,0.15);color:#fff;font-size:1rem;outline:none;box-sizing:border-box;">
      </div>
      <button type="submit" style="width:100%;padding:12px;background:#dc3545;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:bold;cursor:pointer;">Login as Admin</button>
    </form>
    <div style="text-align:center;margin-top:1rem;">
      <a href="{% url 'index' %}" style="color:rgba(255,255,255,0.6);font-size:0.85rem;">← Back to Home</a>
    </div>
    {% comment %} <div style="margin-top:1.5rem;padding:0.75rem;background:rgba(255,193,7,0.15);border-radius:8px;border:1px solid rgba(255,193,7,0.3);">
      <p style="color:#ffc107;font-size:0.8rem;margin:0;text-align:center;">Default: admin@gmail.com / 123</p>
    </div>
  </div> {% endcomment %}
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
